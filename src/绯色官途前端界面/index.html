<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      /* 保证至少占据屏幕高度的 50%，解决 iframe 默认高度过小的问题 */
      min-height: 50vh;
    }
    #app {
      width: 100%;
      min-height: 50vh;
    }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
